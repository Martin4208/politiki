on:
  # schedule:
  # - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  build_and_run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Create data directories
        run: |
          mkdir -p backend/currently_working/bill/data/github_actions/diet_session
          mkdir -p backend/currently_working/bill/data/github_actions/bills
          mkdir -p backend/currently_working/bill/data/github_actions/content
          mkdir -p backend/currently_working/bill/data/github_actions/progress

      - name: Run script
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: ${{ github.workspace }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_CHAT_MODEL: ${{ secrets.GEMINI_CHAT_MODEL }}
          GEMINI_EMBEDDING_MODEL: ${{ secrets.GEMINI_EMBEDDING_MODEL }}
        run: python scripts/main.py
